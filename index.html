<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🐾 반려동물 계산기</title>
<meta name="description" content="사료·모래 g당(kg당) 단가를 자동 계산하고 역대 최저가·평균가와 비교하는 반려동물 가격 계산기. 적정 체중 계산기 포함." />
<meta property="og:type" content="website" />
<meta property="og:title" content="🐾 반려동물 계산기" />
<meta property="og:description" content="사료·모래 단가 자동 계산 + 역대 최저가/평균가 비교, 적정 체중 계산기" />
<meta property="og:url" content="https://leedalnim.github.io/pet-food-calc/" />
<meta name="twitter:card" content="summary" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="apple-touch-icon" href="favicon.svg" />
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FBF6EF;
    --card: #FFFFFF;
    --ink: #2E2A26;
    --sub: #8B8378;
    --line: #EFE7DA;
    --accent: #FF7A52;
    --accent-soft: #FFE7DC;
    --mint: #2FA98C;
    --mint-soft: #E1F5EF;
    --rose: #E8555A;
    --rose-soft: #FDE6E6;
    --radius: 20px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
  }
  .app {
    width: 100%;
    max-width: 460px;
  }
  .hero {
    text-align: center;
    margin-bottom: 20px;
  }
  .hero .emoji { font-size: 34px; }
  .hero h1 {
    font-size: 20px;
    margin: 6px 0 4px;
    font-weight: 800;
  }
  .hero p {
    margin: 0;
    font-size: 13px;
    color: var(--sub);
  }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: 0 8px 24px rgba(46, 42, 38, 0.06);
    margin-bottom: 16px;
  }
  .row {
    display: flex;
    gap: 10px;
  }
  .row + .row { margin-top: 10px; }
  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field.narrow { flex: 0 0 96px; }
  label {
    font-size: 12px;
    font-weight: 700;
    color: var(--sub);
  }
  select,
  input[type="number"],
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #E7DECE;
    background-color: #FCFAF6;
    font-size: 15px;
    font-family: inherit;
    font-weight: 400;
    color: var(--ink);
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    background-color: #fff;
  }
  input::placeholder { color: #C2B7A6; }
  input[type="text"]:not(:placeholder-shown),
  input[type="number"]:not(:placeholder-shown) {
    background-color: #fff;
    border-color: #DED2BE;
    color: var(--ink);
    font-weight: 700;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }
  input[type="text"]::-webkit-calendar-picker-indicator { display: none !important; }
  .combo { position: relative; }
  .combo .combo-field { padding-right: 36px; cursor: pointer; }
  .combo-arrow {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px;
    height: 8px;
    pointer-events: none;
    transition: transform 0.15s;
  }
  .combo.open .combo-arrow { transform: translateY(-50%) rotate(180deg); }
  .combo-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #E7DECE;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(46, 42, 38, 0.14);
    max-height: 230px;
    overflow-y: auto;
    z-index: 40;
    display: none;
    padding: 4px;
  }
  .combo.open .combo-list { display: block; }
  .combo-opt {
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  .combo-opt:hover, .combo-opt.active { background: var(--accent-soft); }
  .combo-opt.selected { color: var(--accent); font-weight: 700; }
  .combo-empty {
    padding: 12px;
    font-size: 13px;
    color: var(--sub);
    text-align: center;
  }
  .input-unit {
    position: relative;
  }
  .input-unit input { padding-right: 40px; }
  .input-unit span {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    color: var(--sub);
  }
  .hint {
    font-size: 11px;
    color: var(--sub);
    margin-top: 10px;
    line-height: 1.5;
  }
  .unit-price {
    margin-top: 18px;
    text-align: center;
    padding: 18px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent-soft), #FFF3EC);
  }
  .unit-price .label {
    font-size: 12px;
    color: var(--sub);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .unit-price .value {
    font-size: 30px;
    font-weight: 800;
    color: var(--accent);
  }
  .unit-price .value span {
    font-size: 15px;
    font-weight: 600;
    margin-left: 2px;
  }
  .unit-price .sub {
    margin-top: 4px;
    font-size: 12px;
    color: var(--sub);
  }
  .badges {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 14px;
  }
  .badge {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
  }
  .badge.cheap { background: var(--mint-soft); color: var(--mint); }
  .badge.expensive { background: var(--rose-soft); color: var(--rose); }
  .badge.neutral { background: #F2F0EC; color: var(--sub); }
  .badge strong { font-size: 15px; }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .stat-box {
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px;
  }
  .stat-box .stat-label {
    font-size: 12px;
    color: var(--sub);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .stat-box .stat-value {
    font-size: 18px;
    font-weight: 800;
  }
  .stat-box .stat-sub {
    font-size: 12px;
    color: var(--sub);
    margin-top: 2px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 800;
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .compare-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 12px;
    background: #FBFAF7;
  }
  .compare-item.best {
    background: var(--mint-soft);
  }
  .compare-item .rank {
    font-size: 12px;
    font-weight: 800;
    color: var(--sub);
    width: 22px;
  }
  .compare-item.best .rank { color: var(--mint); }
  .compare-item .name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    margin-left: 4px;
  }
  .compare-item .price {
    font-size: 13px;
    font-weight: 800;
  }
  .compare-lookup {
    margin-top: 12px;
  }
  .compare-result {
    margin-top: 10px;
    display: none;
  }
  .save-btn {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .save-btn:disabled { opacity: 0.4; cursor: default; }
  .save-btn.saved { background: var(--mint); }
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--sub);
    margin-top: 8px;
  }
  .toast {
    font-size: 12px;
    text-align: center;
    color: var(--rose);
    margin-top: 8px;
    display: none;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 28px 0 16px;
  }
  .divider span {
    font-size: 15px;
    font-weight: 800;
    white-space: nowrap;
  }
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .bcs-visual {
    display: flex;
    justify-content: space-between;
    gap: 2px;
    margin-top: 4px;
  }
  .bcs-cat {
    background: none;
    border: none;
    padding: 4px 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    flex: 1;
    border-radius: 10px;
  }
  .bcs-cat:hover { background: #F5F0E8; }
  .bcs-cat svg { width: 100%; height: 46px; }
  .bcs-cat .n {
    font-size: 11px;
    font-weight: 700;
    color: var(--sub);
    margin-top: 2px;
  }
  .bcs-cat.selected .n { color: var(--accent); }
  .bcs-caption {
    text-align: center;
    margin-top: 12px;
    font-size: 15px;
    font-weight: 800;
    color: var(--ink);
  }
  .bcs-caption .n { color: var(--accent); }
  .bcs-caption.warn { color: var(--rose); }
  .bcs-caption.warn .n { color: var(--rose); }
  .target-highlight {
    margin-top: 14px;
    padding: 16px;
    border-radius: 14px;
    background: var(--mint-soft);
    text-align: center;
  }
  .target-highlight.over { background: var(--rose-soft); }
  .target-highlight .t-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--sub);
  }
  .target-highlight .t-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--mint);
    margin-top: 4px;
  }
  .target-highlight.over .t-value { color: var(--rose); }
  .target-highlight .t-value span {
    font-size: 15px;
    font-weight: 600;
    margin-left: 2px;
  }
  .target-highlight .t-diff {
    font-size: 13px;
    color: var(--sub);
    margin-top: 4px;
  }
  .target-highlight .t-detail {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(46, 42, 38, 0.08);
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink);
    display: none;
  }
  .target-highlight .t-detail strong { color: var(--mint); font-weight: 800; }
  .target-highlight.over .t-detail strong { color: var(--rose); }
  .bcs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }
  .bcs-guide-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    padding: 4px 6px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .bcs-guide-btn:hover { text-decoration: underline; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(46, 42, 38, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px;
    width: 100%;
    max-width: 420px;
    max-height: 82vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(46, 42, 38, 0.28);
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
  }
  .modal-head .title { font-size: 15px; font-weight: 800; }
  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    line-height: 1;
    color: var(--sub);
    cursor: pointer;
    padding: 2px 6px;
  }
  .modal-body {
    padding: 8px 16px 16px;
    overflow-y: auto;
  }
  .bcs-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 8px;
    border-bottom: 1px solid #F3EDE3;
  }
  .bcs-row:last-child { border-bottom: none; }
  .bcs-row.ideal { background: var(--mint-soft); border-radius: 12px; border-bottom: none; }
  .bcs-row-cat {
    flex: 0 0 62px;
    height: 46px;
  }
  .bcs-row-cat svg { width: 100%; height: 100%; }
  .bcs-row-title {
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 3px;
  }
  .bcs-row-title b { color: var(--accent); margin-right: 4px; }
  .bcs-row.ideal .bcs-row-title b { color: var(--mint); }
  .bcs-row-desc {
    font-size: 12px;
    color: var(--sub);
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="emoji">🐾</div>
      <h1>사료 가격 비교 계산기</h1>
      <p>g당 단가로 언제나 최저가를 확인하세요</p>
    </div>

    <div class="card">
      <div class="row">
        <div class="field">
          <label for="category">카테고리</label>
          <div class="combo" id="categoryCombo">
            <input type="text" class="combo-field" id="category" placeholder="카테고리 선택" autocomplete="off" />
            <svg class="combo-arrow" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="#8B8378" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="combo-list" id="categoryList"></div>
          </div>
        </div>
        <div class="field">
          <label for="product">제품명</label>
          <div class="combo" id="productCombo">
            <input type="text" class="combo-field" id="product" placeholder="제품명 검색" autocomplete="off" />
            <svg class="combo-arrow" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="#8B8378" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <div class="combo-list" id="productList"></div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="weight">개당 무게</label>
          <div class="input-unit">
            <input type="number" id="weight" placeholder="85" min="0" />
            <span id="weightUnit">g</span>
          </div>
        </div>
        <div class="field narrow">
          <label for="qty">수량</label>
          <div class="input-unit">
            <input type="number" id="qty" placeholder="1" min="1" step="1" />
            <span>개</span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="price">총 가격</label>
          <div class="input-unit">
            <input type="number" id="price" placeholder="2320" min="0" />
            <span>원</span>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label for="note">비고 (선택)</label>
          <input type="text" id="note" placeholder="예: 유통기한 임박, 지마켓 쿠폰가" autocomplete="off" />
        </div>
      </div>
      <div class="hint">습식은 g, 건식·모래는 kg으로 입력하세요. 24개들이 박스처럼 묶음이면 수량을 입력하면 개당 단가도 같이 계산해요</div>

      <div class="unit-price">
        <div class="label">계산된 단가</div>
        <div class="value" id="unitPriceValue">- <span>원/g</span></div>
        <div class="sub" id="unitPriceSub"></div>
      </div>

      <div class="badges" id="badges"></div>
      <button class="save-btn" id="saveBtn" disabled>이 구매 기록 저장하기</button>
      <div class="toast" id="toast"></div>
    </div>

    <div class="card" id="statsCard" style="display:none;">
      <div class="section-title">📊 이 제품의 역대 기록</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">역대 최저가</div>
          <div class="stat-value" id="minValue">-</div>
          <div class="stat-sub" id="minSub"></div>
        </div>
        <div class="stat-box">
          <div class="stat-label">역대 평균가</div>
          <div class="stat-value" id="avgValue">-</div>
          <div class="stat-sub" id="avgSub"></div>
        </div>
      </div>
    </div>

    <div class="card" id="compareCard" style="display:none;">
      <div class="section-title">🔍 같은 카테고리 다른 제품과 비교</div>
      <div class="compare-item best" id="compareBest"></div>

      <div class="field compare-lookup">
        <label for="compareProduct">다른 제품 최저가 검색해서 보기</label>
        <div class="combo" id="compareProductCombo">
          <input type="text" class="combo-field" id="compareProduct" placeholder="제품명을 입력하세요" autocomplete="off" />
          <svg class="combo-arrow" viewBox="0 0 12 8"><path d="M1 1l5 5 5-5" stroke="#8B8378" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div class="combo-list" id="compareProductList"></div>
        </div>
      </div>
      <div class="compare-item compare-result" id="compareResult"></div>
    </div>

    <div class="footer-note">원본 구매 데이터는 비공개 스프레드시트에 안전하게 보관됩니다</div>

    <div class="divider"><span>🐈 적정 체중 계산기</span></div>

    <div class="card">
      <div class="row">
        <div class="field">
          <label for="petName">이름 (선택)</label>
          <input type="text" id="petName" placeholder="콩" />
        </div>
        <div class="field">
          <label for="petWeight">현재 체중</label>
          <div class="input-unit">
            <input type="number" id="petWeight" placeholder="6.7" min="0" step="0.01" />
            <span>kg</span>
          </div>
        </div>
      </div>

      <div class="bcs-header">
        <label>신체상태점수(BCS) 선택</label>
        <button type="button" class="bcs-guide-btn" id="bcsGuideBtn">📖 점수 가이드 자세히 보기</button>
      </div>
      <div class="bcs-visual" id="bcsVisual"></div>
      <div class="bcs-caption" id="bcsCaption"></div>

      <div class="target-highlight" id="targetHighlight" style="display:none;">
        <div class="t-label" id="targetLabel">목표 체중</div>
        <div class="t-value" id="targetValue">-<span>kg</span></div>
        <div class="t-diff" id="targetDiff"></div>
        <div class="t-detail" id="dietDetail"></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="bcsModal">
    <div class="modal">
      <div class="modal-head">
        <span class="title">🐈 신체상태점수(BCS) 가이드</span>
        <button type="button" class="modal-close" id="bcsModalClose">✕</button>
      </div>
      <div class="modal-body" id="bcsModalBody"></div>
    </div>
  </div>

<script>
  // 배포한 Apps Script 웹앱 URL을 여기에 붙여넣으세요.
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDJpxX8AZX48dpoBbFmR8UlU2NN0tVuMooRgntJMkqvIj1Bko_1CwnFwffv-7fRteK/exec';

  const categoryEl = document.getElementById('category');
  const categoryListEl = document.getElementById('categoryList');
  const productEl = document.getElementById('product');
  const productListEl = document.getElementById('productList');
  const weightEl = document.getElementById('weight');
  const weightUnitEl = document.getElementById('weightUnit');
  const qtyEl = document.getElementById('qty');
  const priceEl = document.getElementById('price');
  const noteEl = document.getElementById('note');
  const unitPriceValueEl = document.getElementById('unitPriceValue');
  const unitPriceSubEl = document.getElementById('unitPriceSub');
  const badgesEl = document.getElementById('badges');
  const saveBtn = document.getElementById('saveBtn');
  const toastEl = document.getElementById('toast');
  const statsCard = document.getElementById('statsCard');
  const compareCard = document.getElementById('compareCard');
  const minValue = document.getElementById('minValue');
  const minSub = document.getElementById('minSub');
  const avgValue = document.getElementById('avgValue');
  const avgSub = document.getElementById('avgSub');
  const compareBestEl = document.getElementById('compareBest');
  const compareProductEl = document.getElementById('compareProduct');
  const compareProductListEl = document.getElementById('compareProductList');
  const compareResultEl = document.getElementById('compareResult');

  let meta = { categories: [], productsByCategory: {} };
  let lastCategoryComparison = [];
  let compareOptions = [];
  let compareUnit = catUnit('건식');
  let compareTimer = null;

  function won(n) {
    return Math.round(n).toLocaleString('ko-KR');
  }

  // 카테고리별 단위: 습식은 g, 그 외(건식·모래)는 kg
  function catUnit(category) {
    return category === '습식'
      ? { wLabel: 'g', toG: 1, pLabel: '원/g', pMul: 1, step: '1', ph: '85', defW: 100 }
      : { wLabel: 'kg', toG: 1000, pLabel: '원/kg', pMul: 1000, step: '0.1', ph: '5', defW: 1 };
  }

  function fmtUnitPrice(perGram, u) {
    return (perGram * u.pMul).toFixed(1) + u.pLabel;
  }

  function getQty() {
    const q = parseInt(qtyEl.value, 10);
    return q > 0 ? q : 1;
  }

  function isValid(value, list) {
    return !!value && list.includes(value);
  }

  // 검색 가능한 커스텀 드롭다운
  function makeCombo(comboId, getOptions, onChange) {
    const comboEl = document.getElementById(comboId);
    const input = comboEl.querySelector('.combo-field');
    const listEl = comboEl.querySelector('.combo-list');
    let current = '';

    function render(filter) {
      const opts = getOptions();
      const f = (filter || '').trim().toLowerCase();
      const filtered = f ? opts.filter(o => o.toLowerCase().includes(f)) : opts;
      if (!filtered.length) {
        listEl.innerHTML = `<div class="combo-empty">검색 결과가 없어요</div>`;
        return;
      }
      listEl.innerHTML = filtered
        .map(o => `<div class="combo-opt${o === current ? ' selected' : ''}" data-val="${o.replace(/"/g, '&quot;')}">${o}</div>`)
        .join('');
    }

    function open() { render(''); comboEl.classList.add('open'); }
    function close() { comboEl.classList.remove('open'); }

    input.addEventListener('focus', () => { open(); input.select(); });
    input.addEventListener('click', () => open());
    input.addEventListener('input', () => { comboEl.classList.add('open'); render(input.value); });
    listEl.addEventListener('mousedown', (e) => {
      const opt = e.target.closest('.combo-opt');
      if (!opt) return;
      e.preventDefault();
      current = opt.dataset.val;
      input.value = current;
      close();
      if (onChange) onChange(current);
    });
    input.addEventListener('blur', () => {
      setTimeout(() => {
        if (input.value !== current) input.value = current; // 유효값으로 복원
        close();
      }, 150);
    });

    return {
      get value() { return current; },
      set(val, silent) {
        current = val || '';
        input.value = current;
        if (!silent && onChange) onChange(current);
      }
    };
  }

  const categoryCombo = makeCombo('categoryCombo',
    () => meta.categories,
    () => { fillProducts(); updateWeightUnit(); scheduleCompare(); });

  const productCombo = makeCombo('productCombo',
    () => meta.productsByCategory[categoryCombo.value] || [],
    () => scheduleCompare());

  async function loadMeta() {
    const res = await fetch(`${APPS_SCRIPT_URL}?action=meta`);
    meta = await res.json();
    if (!isValid(categoryCombo.value, meta.categories)) {
      categoryCombo.set(meta.categories[0] || '', true);
    }
    fillProducts();
    updateWeightUnit();
  }

  function fillProducts() {
    const products = meta.productsByCategory[categoryCombo.value] || [];
    if (!isValid(productCombo.value, products)) {
      productCombo.set(products[0] || '', true);
    }
  }

  function updateWeightUnit() {
    const u = catUnit(categoryCombo.value);
    weightUnitEl.textContent = u.wLabel;
    weightEl.step = u.step;
    weightEl.placeholder = u.ph;
    updateUnitPrice();
  }

  function updateUnitPrice() {
    const u = catUnit(categoryCombo.value);
    const w = parseFloat(weightEl.value);
    const p = parseFloat(priceEl.value);
    const qty = getQty();
    if (w > 0 && p > 0) {
      const totalNative = w * qty;
      const perNative = p / totalNative;
      unitPriceValueEl.innerHTML = `${perNative.toFixed(1)}<span>${u.pLabel}</span>`;
      unitPriceSubEl.textContent = qty > 1
        ? `개당 ${won(p / qty)}원 · 총 ${totalNative.toLocaleString('ko-KR')}${u.wLabel}`
        : '';
      saveBtn.disabled = false;
    } else {
      unitPriceValueEl.innerHTML = `-<span>${u.pLabel}</span>`;
      unitPriceSubEl.textContent = '';
      saveBtn.disabled = true;
    }
  }

  function renderBadges(stats, u) {
    badgesEl.innerHTML = '';
    if (!stats) {
      badgesEl.innerHTML = `<div class="badge neutral">아직 이 제품의 구매 기록이 없어요</div>`;
      return;
    }
    [
      { diff: stats.vsAvgDiff, label: '평균가' },
      { diff: stats.vsMinDiff, label: '최저가' }
    ].forEach(({ diff, label }) => {
      if (diff === null) return;
      const cheaper = diff < 0;
      const cls = diff === 0 ? 'neutral' : cheaper ? 'cheap' : 'expensive';
      const verb = diff === 0 ? '동일해요' : cheaper ? '저렴해요' : '비싸요';
      const amount = (Math.abs(diff) * u.pMul).toFixed(1);
      badgesEl.innerHTML += `
        <div class="badge ${cls}">
          <span>${label}보다</span>
          <strong>${u.wLabel}당 ${amount}원 ${verb}</strong>
        </div>`;
    });
  }

  function renderStats(stats, u, nativeWeight) {
    if (!stats) {
      statsCard.style.display = 'none';
      return;
    }
    statsCard.style.display = 'block';
    const w = nativeWeight > 0 ? nativeWeight : u.defW;
    const grams = w * u.toG;
    minValue.textContent = fmtUnitPrice(stats.minPricePerGram, u);
    minSub.textContent = `${w.toLocaleString('ko-KR')}${u.wLabel} 환산 ${won(stats.minPricePerGram * grams)}원`;
    avgValue.textContent = fmtUnitPrice(stats.avgPricePerGram, u);
    avgSub.textContent = `${w.toLocaleString('ko-KR')}${u.wLabel} 환산 ${won(stats.avgPricePerGram * grams)}원 · 총 ${stats.count}건`;
  }

  function renderCompare(list, currentProduct, u) {
    lastCategoryComparison = list || [];
    compareUnit = u;
    if (!lastCategoryComparison.length) {
      compareCard.style.display = 'none';
      return;
    }
    compareCard.style.display = 'block';

    const best = lastCategoryComparison[0];
    compareBestEl.innerHTML = `
      <span class="rank">1위</span>
      <span class="name">${best.product}${best.product === currentProduct ? ' (현재 제품)' : ''}</span>
      <span class="price">${fmtUnitPrice(best.minPricePerGram, u)}</span>`;

    compareOptions = lastCategoryComparison
      .filter(item => item.product !== currentProduct)
      .map(item => item.product);
    compareProductCombo.set('', true);
    compareResultEl.style.display = 'none';
  }

  function showCompareResult(query) {
    const match = lastCategoryComparison.find(item => item.product === query);
    if (!match) {
      compareResultEl.style.display = 'none';
      return;
    }
    const rank = lastCategoryComparison.findIndex(item => item.product === query) + 1;
    compareResultEl.style.display = 'flex';
    compareResultEl.innerHTML = `
      <span class="rank">${rank}위</span>
      <span class="name">${match.product}</span>
      <span class="price">${fmtUnitPrice(match.minPricePerGram, compareUnit)}</span>`;
  }

  async function runCompare() {
    const category = categoryCombo.value;
    const product = productCombo.value;
    if (!isValid(category, meta.categories)) return;
    if (!isValid(product, meta.productsByCategory[category] || [])) return;
    const u = catUnit(category);
    const w = parseFloat(weightEl.value) || 0;
    const p = parseFloat(priceEl.value) || 0;
    const qty = getQty();
    const totalNative = w * qty;
    const totalGrams = totalNative * u.toG;

    const params = new URLSearchParams({ action: 'compare', category, product, weight: totalGrams, price: p });
    const res = await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`);
    const data = await res.json();

    renderBadges(data.productStats, u);
    renderStats(data.productStats, u, totalNative);
    renderCompare(data.categoryComparison, product, u);
  }

  function scheduleCompare() {
    clearTimeout(compareTimer);
    compareTimer = setTimeout(runCompare, 300);
  }

  async function saveRecord() {
    const category = categoryCombo.value;
    const product = productCombo.value;
    const w = parseFloat(weightEl.value);
    const p = parseFloat(priceEl.value);
    const qty = getQty();
    const note = noteEl.value.trim();
    if (!isValid(category, meta.categories)) return;
    if (!isValid(product, meta.productsByCategory[category] || [])) return;
    if (!w || !p) return;

    const u = catUnit(category);
    const weightGrams = w * u.toG;
    const perUnitPrice = Math.round(p / qty);

    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';
    toastEl.style.display = 'none';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'addRecord', category, product, weightGrams, price: perUnitPrice, note })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      saveBtn.classList.add('saved');
      saveBtn.textContent = '저장 완료 ✓';
      noteEl.value = '';
      await loadMeta();
      await runCompare();
    } catch (err) {
      toastEl.textContent = '저장에 실패했어요. 잠시 후 다시 시도해주세요.';
      toastEl.style.display = 'block';
      saveBtn.textContent = '이 구매 기록 저장하기';
      saveBtn.disabled = false;
    }
  }

  const compareProductCombo = makeCombo('compareProductCombo',
    () => compareOptions,
    (val) => showCompareResult(val));

  weightEl.addEventListener('input', () => { updateUnitPrice(); scheduleCompare(); });
  qtyEl.addEventListener('input', () => { updateUnitPrice(); scheduleCompare(); });
  priceEl.addEventListener('input', () => { updateUnitPrice(); scheduleCompare(); });
  saveBtn.addEventListener('click', saveRecord);

  loadMeta();

  // ── 적정 체중 계산기 ──
  const petNameEl = document.getElementById('petName');
  const petWeightEl = document.getElementById('petWeight');
  const bcsVisualEl = document.getElementById('bcsVisual');
  const bcsCaptionEl = document.getElementById('bcsCaption');
  const targetHighlightEl = document.getElementById('targetHighlight');
  const targetLabelEl = document.getElementById('targetLabel');
  const targetValueEl = document.getElementById('targetValue');
  const targetDiffEl = document.getElementById('targetDiff');
  const dietDetailEl = document.getElementById('dietDetail');

  const BCS_LABELS = ['심각한 마름', '마름', '심각한 저체중', '저체중', '정상', '과체중', '심각한 과체중', '비만', '심각한 비만'];
  const BCS_DESC = [
    '갈비뼈·척추·골반이 두드러지게 보이고 만져짐, 체지방이 거의 없음',
    '갈비뼈가 쉽게 만져지고 살짝 보임, 근육량이 감소한 상태',
    '갈비뼈가 최소한의 지방으로 덮여 만져짐, 위에서 보면 허리선 뚜렷',
    '갈비뼈가 얇은 지방층 아래 쉽게 만져짐, 허리선과 배 접힘이 뚜렷',
    '갈비뼈가 적당한 지방 아래 만져짐, 위에서 봤을 때 허리선이 균형있게 보임',
    '갈비뼈가 지방층으로 잘 만져지지 않음, 허리선이 희미해짐',
    '갈비뼈를 만지기 어려움, 허리선 거의 없고 옆구리·배가 처짐',
    '갈비뼈가 두꺼운 지방으로 덮여 만져지지 않음, 배가 확연히 처짐',
    '가슴·등·목에 지방 축적이 뚜렷, 배가 크게 늘어져 걷기 불편할 정도',
  ];
  let selectedBcs = 5;

  function catSvg(score, selected) {
    const t = (score - 1) / 8;
    const fill = selected ? '#FF7A52' : '#DED2C0';
    const stroke = selected ? '#E85F32' : '#AFA18C';
    const bellyDip = 34 + t * 17;
    const chestX = 70 + t * 6;
    const cx = chestX + 4; // 얼굴 중심
    return `
    <svg viewBox="0 0 100 55" xmlns="http://www.w3.org/2000/svg">
      <path d="M8,26 C1,20 1,9 10,6" stroke="${stroke}" stroke-width="2.6" fill="none" stroke-linecap="round"/>
      <path d="M${(cx - 12).toFixed(1)},13 L${(cx - 11).toFixed(1)},-2 L${(cx - 1).toFixed(1)},10 Z"
        fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M${(cx + 12).toFixed(1)},13 L${(cx + 11).toFixed(1)},-2 L${(cx + 1).toFixed(1)},10 Z"
        fill="${fill}" stroke="${stroke}" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M10,28
        C4,14 16,6 28,8
        C42,2 60,2 70,${(6 + t * 2).toFixed(1)}
        C${(chestX + 14).toFixed(1)},${(8 + t * 2).toFixed(1)} ${(chestX + 19).toFixed(1)},14 ${(chestX + 17).toFixed(1)},20
        C${(chestX + 19).toFixed(1)},26 ${(chestX + 14).toFixed(1)},32 ${(chestX + 8).toFixed(1)},36
        L${(chestX + 6).toFixed(1)},44
        C${(chestX - 10).toFixed(1)},${(bellyDip + 6).toFixed(1)} 40,${(bellyDip + 6).toFixed(1)} 24,${bellyDip.toFixed(1)}
        C14,${(bellyDip - 4).toFixed(1)} 8,${(bellyDip - 14).toFixed(1)} 10,28 Z"
        fill="${fill}" stroke="${stroke}" stroke-width="1.8" stroke-linejoin="round"/>
      <circle cx="${(chestX + 11).toFixed(1)}" cy="19" r="1.8" fill="#2E2A26"/>
      <path d="M${(chestX + 4).toFixed(1)},23 l-7,-1.5 M${(chestX + 4).toFixed(1)},25.5 l-7,1.5"
        stroke="${stroke}" stroke-width="1" stroke-linecap="round"/>
    </svg>`;
  }

  function renderBcsVisual() {
    bcsVisualEl.innerHTML = '';
    for (let s = 1; s <= 9; s++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'bcs-cat' + (s === selectedBcs ? ' selected' : '');
      btn.title = `${s} · ${BCS_LABELS[s - 1]}`;
      btn.innerHTML = `${catSvg(s, s === selectedBcs)}<span class="n">${s}</span>`;
      btn.addEventListener('click', () => {
        selectedBcs = s;
        renderBcsVisual();
        calcDiet();
      });
      bcsVisualEl.appendChild(btn);
    }
    bcsCaptionEl.classList.toggle('warn', selectedBcs <= 3 || selectedBcs >= 7);
    bcsCaptionEl.innerHTML = `<span class="n">${selectedBcs}</span> · ${BCS_LABELS[selectedBcs - 1]}`;
  }

  function calcRER(weightKg) {
    return weightKg < 2 ? 70 * Math.pow(weightKg, 0.75) : 30 * weightKg + 70;
  }

  function calcDiet() {
    const name = petNameEl.value.trim() || '반려동물';
    const weight = parseFloat(petWeightEl.value);
    const bcs = selectedBcs;

    if (!weight || weight <= 0) {
      targetHighlightEl.style.display = 'none';
      dietDetailEl.style.display = 'none';
      return;
    }

    const targetWeight = weight / (1 + 0.1 * (bcs - 5));
    const diff = weight - targetWeight;
    const calories = Math.round(calcRER(weight));
    const water = Math.round(targetWeight * 44);

    targetHighlightEl.style.display = 'block';
    dietDetailEl.style.display = 'block';
    targetHighlightEl.classList.toggle('over', diff > 0.01);

    targetValueEl.innerHTML = `${targetWeight.toFixed(2)}<span>kg</span>`;

    if (Math.abs(diff) < 0.01) {
      targetLabelEl.textContent = `${name}의 목표 체중 (지금이 적정 체중이에요 🎉)`;
      targetDiffEl.textContent = '';
      dietDetailEl.innerHTML = `
        하루에 <strong>${calories}kcal</strong>를 급여하고
        <strong>${water}ml</strong>의 음수량을 유지해주세요 💧`;
      return;
    }

    const weeklyRate = weight * 0.01;
    const durationWeeks = Math.max(1, Math.round(Math.abs(diff) / weeklyRate));
    const perWeek = (Math.abs(diff) / durationWeeks).toFixed(2);
    const verb = diff > 0 ? '감량' : '증량';

    targetLabelEl.textContent = `${name}의 목표 체중`;
    targetDiffEl.textContent = `현재보다 ${Math.abs(diff).toFixed(2)}kg ${verb}`;

    dietDetailEl.innerHTML = `
      1주일에 <strong>${perWeek}kg</strong>씩 <strong>${durationWeeks}주간</strong> 관리가 필요해요 🔥<br/>
      간식을 포함하여 하루에 <strong>${calories}kcal</strong>를 급여하고
      <strong>${water}ml</strong>의 음수량을 채워주세요 💧`;
  }

  // ── BCS 가이드 팝업 ──
  const bcsGuideBtn = document.getElementById('bcsGuideBtn');
  const bcsModal = document.getElementById('bcsModal');
  const bcsModalClose = document.getElementById('bcsModalClose');
  const bcsModalBody = document.getElementById('bcsModalBody');

  function renderBcsModal() {
    let html = '';
    for (let s = 1; s <= 9; s++) {
      html += `
        <div class="bcs-row${s === 5 ? ' ideal' : ''}">
          <div class="bcs-row-cat">${catSvg(s, s === 5)}</div>
          <div class="bcs-row-txt">
            <div class="bcs-row-title"><b>${s}</b>${BCS_LABELS[s - 1]}${s === 5 ? ' (이상적)' : ''}</div>
            <div class="bcs-row-desc">${BCS_DESC[s - 1]}</div>
          </div>
        </div>`;
    }
    bcsModalBody.innerHTML = html;
  }

  function openBcsModal() {
    renderBcsModal();
    bcsModal.classList.add('open');
  }
  function closeBcsModal() {
    bcsModal.classList.remove('open');
  }

  bcsGuideBtn.addEventListener('click', openBcsModal);
  bcsModalClose.addEventListener('click', closeBcsModal);
  bcsModal.addEventListener('click', (e) => { if (e.target === bcsModal) closeBcsModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeBcsModal(); });

  renderBcsVisual();
  petNameEl.addEventListener('input', calcDiet);
  petWeightEl.addEventListener('input', calcDiet);
</script>
</body>
</html>
